<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — RAG PDF Chat</title>
<meta name="description" content="Sign in to RAG PDF Chat — AI-powered PDF document assistant"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080b14;--surface:rgba(13,17,32,0.85);--surface2:#111827;
  --border:rgba(99,120,180,0.2);--accent:#6366f1;--accent2:#818cf8;--accent3:#a5b4fc;
  --glow:rgba(99,102,241,0.4);--text:#f1f5ff;--text2:#94a3b8;--text3:#475569;
  --success:#34d399;--danger:#f87171;
}
body{
  min-height:100dvh;display:flex;align-items:center;justify-content:center;
  background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);
  background-image:
    radial-gradient(ellipse 80% 60% at 50% -10%,rgba(99,102,241,.18) 0%,transparent 60%),
    radial-gradient(ellipse 50% 50% at 85% 90%,rgba(139,92,246,.1) 0%,transparent 50%),
    radial-gradient(ellipse 40% 40% at 10% 80%,rgba(236,72,153,.06) 0%,transparent 50%);
  overflow:hidden;
}

/* Floating orbs */
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;animation:float 8s ease-in-out infinite}
.orb1{width:400px;height:400px;background:rgba(99,102,241,.12);top:-100px;left:-100px;animation-delay:0s}
.orb2{width:300px;height:300px;background:rgba(139,92,246,.1);bottom:-80px;right:-80px;animation-delay:-3s}
.orb3{width:200px;height:200px;background:rgba(236,72,153,.07);top:50%;left:60%;animation-delay:-5s}
@keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-30px) scale(1.05)}}

/* Card */
.card{
  position:relative;z-index:1;width:100%;max-width:420px;
  background:var(--surface);backdrop-filter:blur(20px);
  border:1px solid var(--border);border-radius:24px;
  padding:40px 36px;margin:20px;
  box-shadow:0 25px 60px rgba(0,0,0,.5),0 0 0 1px rgba(99,102,241,.08),inset 0 1px 0 rgba(255,255,255,.06);
  animation:cardIn .5s cubic-bezier(.16,1,.3,1);
}
@keyframes cardIn{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.card::before{
  content:'';position:absolute;inset:0;border-radius:24px;
  background:linear-gradient(135deg,rgba(99,102,241,.06) 0%,transparent 50%);
  pointer-events:none;
}

/* Logo */
.logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.logo-icon{
  width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,var(--accent),#8b5cf6,#ec4899);
  display:flex;align-items:center;justify-content:center;font-size:20px;
  box-shadow:0 0 24px var(--glow);flex-shrink:0;
}
.logo-text{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;
  background:linear-gradient(135deg,var(--text) 30%,var(--accent3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo-tag{font-size:10px;color:var(--text3);font-weight:500;letter-spacing:.05em;margin-top:-2px}

/* Heading */
h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;margin-bottom:6px;
  background:linear-gradient(135deg,var(--text),var(--accent3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sub{font-size:13px;color:var(--text3);margin-bottom:28px;line-height:1.5}

/* Form */
.form-group{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;letter-spacing:.03em}
.input-wrap{position:relative}
input[type=email],input[type=password],input[type=text]{
  width:100%;padding:12px 14px;padding-right:44px;
  background:rgba(17,24,39,.6);border:1.5px solid rgba(99,120,180,.2);
  border-radius:10px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;
  outline:none;transition:all .2s;
}
input:focus{border-color:rgba(99,102,241,.6);background:rgba(17,24,39,.9);
  box-shadow:0 0 0 3px rgba(99,102,241,.12);}
input::placeholder{color:var(--text3)}
.input-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--text3);cursor:pointer;padding:2px;
  font-size:16px;transition:color .2s;line-height:1}
.eye-btn:hover{color:var(--accent2)}

/* Remember / forgot */
.row-between{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.check-label{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text2);cursor:pointer;user-select:none}
.check-label input[type=checkbox]{width:14px;height:14px;accent-color:var(--accent);cursor:pointer}
.forgot{font-size:12px;color:var(--accent2);text-decoration:none;font-weight:500;transition:color .2s}
.forgot:hover{color:var(--accent3)}

/* Submit */
.btn{
  width:100%;padding:13px;margin-top:4px;
  background:linear-gradient(135deg,var(--accent),#8b5cf6);
  border:none;border-radius:10px;color:#fff;
  font-family:'Inter',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;transition:all .2s;
  box-shadow:0 4px 16px rgba(99,102,241,.4);
  display:flex;align-items:center;justify-content:center;gap:8px;
  letter-spacing:.02em;
}
.btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 24px rgba(99,102,241,.5)}
.btn:active:not(:disabled){transform:translateY(0)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}

/* Spinner */
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.btn.loading .spinner{display:block}
.btn.loading .btn-text{display:none}

/* Divider */
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text3);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* Error / success */
.msg-box{
  display:none;padding:10px 14px;border-radius:9px;font-size:13px;
  font-weight:500;margin-bottom:16px;animation:fadeIn .3s;
  display:flex;align-items:center;gap:8px;
}
.msg-box.hidden{display:none}
.msg-box.error{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:var(--danger)}
.msg-box.success{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.25);color:var(--success)}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* Footer link */
.footer-link{text-align:center;margin-top:20px;font-size:13px;color:var(--text3)}
.footer-link a{color:var(--accent2);font-weight:600;text-decoration:none;transition:color .2s}
.footer-link a:hover{color:var(--accent3)}

/* Password strength */
.strength-bar{display:flex;gap:3px;margin-top:6px;display:none}
.strength-seg{height:3px;flex:1;border-radius:2px;background:var(--border);transition:background .3s}

/* Responsive */
@media(max-width:480px){.card{padding:30px 22px}}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">✦</div>
    <div>
      <div class="logo-text">RAG PDF Chat</div>
      <div class="logo-tag">AI Document Assistant</div>
    </div>
  </div>

  <h1>Welcome back</h1>
  <p class="sub">Sign in to access your documents and chat history</p>

  <div class="msg-box hidden" id="msg-box"></div>

  <form id="login-form" onsubmit="handleLogin(event)" novalidate>
    <div class="form-group">
      <label for="email">Email address</label>
      <div class="input-wrap">
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required/>
        <span class="input-icon">📧</span>
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required/>
        <button type="button" class="eye-btn" onclick="togglePwd('password',this)" id="eye-btn">👁</button>
      </div>
    </div>

    <div class="row-between">
      <label class="check-label">
        <input type="checkbox" id="remember"/>
        Remember me
      </label>
      <a href="#" class="forgot">Forgot password?</a>
    </div>

    <button class="btn" type="submit" id="submit-btn">
      <div class="spinner"></div>
      <span class="btn-text">Sign In →</span>
    </button>
  </form>

  <div class="divider">or</div>

  <div class="footer-link">
    Don't have an account? <a href="register.html">Create account</a>
  </div>
</div>

<script>
// Redirect if already logged in
(function() {
  const token = localStorage.getItem('ragToken');
  if (token) { try { const p = JSON.parse(atob(token.split('.')[1])); if (p.exp > Date.now()/1000) window.location.href = 'index.html'; } catch{} }
})();

function togglePwd(id, btn) {
  const inp = document.getElementById(id);
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}

function showMsg(text, type) {
  const box = document.getElementById('msg-box');
  box.className = 'msg-box ' + type;
  box.innerHTML = (type==='error'?'⚠ ':'✅ ') + text;
  box.style.display = 'flex';
}

async function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('submit-btn');

  if (!email || !password) { showMsg('Please fill in all fields.', 'error'); return; }

  btn.classList.add('loading'); btn.disabled = true;
  document.getElementById('msg-box').style.display = 'none';

  try {
    const res = await fetch('/api/auth?action=login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) { showMsg(data.error || 'Login failed.', 'error'); return; }

    localStorage.setItem('ragToken', data.token);
    localStorage.setItem('ragUser', JSON.stringify(data.user));
    showMsg('Login successful! Redirecting…', 'success');
    setTimeout(() => window.location.href = 'index.html', 800);
  } catch (err) {
    showMsg('Network error. Please try again.', 'error');
  } finally {
    btn.classList.remove('loading'); btn.disabled = false;
  }
}
</script>
</body>
</html>
