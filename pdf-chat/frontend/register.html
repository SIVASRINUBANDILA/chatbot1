<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Create Account — RAG PDF Chat</title>
<meta name="description" content="Create your RAG PDF Chat account — AI-powered PDF document assistant"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080b14;--surface:rgba(13,17,32,0.88);
  --border:rgba(99,120,180,0.2);--accent:#6366f1;--accent2:#818cf8;--accent3:#a5b4fc;
  --glow:rgba(99,102,241,0.4);--text:#f1f5ff;--text2:#94a3b8;--text3:#475569;
  --success:#34d399;--danger:#f87171;--warn:#fbbf24;
}
body{
  min-height:100dvh;display:flex;align-items:center;justify-content:center;
  background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);
  background-image:
    radial-gradient(ellipse 70% 60% at 80% 10%,rgba(139,92,246,.16) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 10% 90%,rgba(99,102,241,.12) 0%,transparent 60%),
    radial-gradient(ellipse 40% 40% at 50% 50%,rgba(236,72,153,.04) 0%,transparent 50%);
  overflow-x:hidden;padding:20px 0;
}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;animation:float 9s ease-in-out infinite}
.orb1{width:350px;height:350px;background:rgba(139,92,246,.13);top:-80px;right:-80px;animation-delay:0s}
.orb2{width:280px;height:280px;background:rgba(99,102,241,.1);bottom:-60px;left:-60px;animation-delay:-4s}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-25px)}}

.card{
  position:relative;z-index:1;width:100%;max-width:440px;
  background:var(--surface);backdrop-filter:blur(20px);
  border:1px solid var(--border);border-radius:24px;
  padding:38px 36px;margin:20px;
  box-shadow:0 25px 60px rgba(0,0,0,.5),0 0 0 1px rgba(99,102,241,.08),inset 0 1px 0 rgba(255,255,255,.06);
  animation:cardIn .5s cubic-bezier(.16,1,.3,1);
}
@keyframes cardIn{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.card::before{content:'';position:absolute;inset:0;border-radius:24px;background:linear-gradient(135deg,rgba(99,102,241,.06),transparent 50%);pointer-events:none}

.logo{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.logo-icon{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#8b5cf6,#ec4899);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 24px var(--glow);flex-shrink:0}
.logo-text{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;background:linear-gradient(135deg,var(--text) 30%,var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-tag{font-size:10px;color:var(--text3);font-weight:500;letter-spacing:.05em;margin-top:-2px}

h1{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:5px;background:linear-gradient(135deg,var(--text),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{font-size:13px;color:var(--text3);margin-bottom:24px;line-height:1.5}

.form-group{margin-bottom:14px}
label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;letter-spacing:.03em}
.input-wrap{position:relative}
input[type=text],input[type=email],input[type=password]{
  width:100%;padding:12px 14px;padding-right:44px;
  background:rgba(17,24,39,.6);border:1.5px solid rgba(99,120,180,.2);
  border-radius:10px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;
  outline:none;transition:all .2s;
}
input:focus{border-color:rgba(99,102,241,.6);background:rgba(17,24,39,.9);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
input::placeholder{color:var(--text3)}
input.valid{border-color:rgba(52,211,153,.4)}
input.invalid{border-color:rgba(248,113,113,.4)}
.input-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none;transition:all .2s}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;padding:2px;font-size:15px;transition:color .2s;line-height:1}
.eye-btn:hover{color:var(--accent2)}

/* Password strength */
.strength-wrap{margin-top:7px}
.strength-bars{display:flex;gap:3px}
.s-bar{height:3px;flex:1;border-radius:2px;background:rgba(99,120,180,.15);transition:background .4s}
.strength-label{font-size:10px;margin-top:4px;font-weight:500;transition:color .3s}

/* Helper text */
.help{font-size:11px;color:var(--text3);margin-top:5px}

/* Terms */
.terms-label{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--text2);cursor:pointer;line-height:1.5;margin-bottom:16px}
.terms-label input[type=checkbox]{width:14px;height:14px;margin-top:1px;accent-color:var(--accent);flex-shrink:0;cursor:pointer}
.terms-label a{color:var(--accent2);text-decoration:none;font-weight:500}
.terms-label a:hover{color:var(--accent3)}

/* Buttons */
.btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),#8b5cf6);border:none;border-radius:10px;color:#fff;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(99,102,241,.4);display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:.02em}
.btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 24px rgba(99,102,241,.5)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.btn.loading .spinner{display:block}
.btn.loading .btn-text{display:none}

.divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--text3);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

.msg-box{padding:10px 14px;border-radius:9px;font-size:13px;font-weight:500;margin-bottom:14px;display:flex;align-items:center;gap:8px;animation:fadeIn .3s}
.msg-box.hidden{display:none}
.msg-box.error{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:var(--danger)}
.msg-box.success{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.25);color:var(--success)}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

.footer-link{text-align:center;margin-top:18px;font-size:13px;color:var(--text3)}
.footer-link a{color:var(--accent2);font-weight:600;text-decoration:none;transition:color .2s}
.footer-link a:hover{color:var(--accent3)}

/* Features list */
.features{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
.feat{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.12);border-radius:20px;padding:4px 10px}
.feat span{color:var(--success);font-size:12px}

@media(max-width:480px){.card{padding:28px 20px}}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">✦</div>
    <div>
      <div class="logo-text">RAG PDF Chat</div>
      <div class="logo-tag">AI Document Assistant</div>
    </div>
  </div>

  <h1>Create your account</h1>
  <p class="sub">Start chatting with your PDFs in seconds — free forever</p>

  <div class="features">
    <div class="feat"><span>✓</span> AI-powered chat</div>
    <div class="feat"><span>✓</span> Cloud sessions</div>
    <div class="feat"><span>✓</span> Saved favorites</div>
    <div class="feat"><span>✓</span> Multi-language</div>
  </div>

  <div class="msg-box hidden" id="msg-box"></div>

  <form id="register-form" onsubmit="handleRegister(event)" novalidate>
    <div class="form-group">
      <label for="name">Full name</label>
      <div class="input-wrap">
        <input type="text" id="name" placeholder="Your full name" autocomplete="name" required/>
        <span class="input-icon" id="name-icon">👤</span>
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email address</label>
      <div class="input-wrap">
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required/>
        <span class="input-icon" id="email-icon">📧</span>
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="Min. 6 characters" autocomplete="new-password" oninput="checkStrength(this.value)" required/>
        <button type="button" class="eye-btn" onclick="togglePwd('password',this)">👁</button>
      </div>
      <div class="strength-wrap" id="strength-wrap" style="display:none">
        <div class="strength-bars">
          <div class="s-bar" id="s1"></div>
          <div class="s-bar" id="s2"></div>
          <div class="s-bar" id="s3"></div>
          <div class="s-bar" id="s4"></div>
        </div>
        <div class="strength-label" id="s-label"></div>
      </div>
    </div>

    <div class="form-group">
      <label for="confirm">Confirm password</label>
      <div class="input-wrap">
        <input type="password" id="confirm" placeholder="Repeat your password" autocomplete="new-password" oninput="checkMatch()" required/>
        <button type="button" class="eye-btn" onclick="togglePwd('confirm',this)">👁</button>
      </div>
      <div class="help" id="match-hint"></div>
    </div>

    <label class="terms-label">
      <input type="checkbox" id="terms" required/>
      I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
    </label>

    <button class="btn" type="submit" id="submit-btn">
      <div class="spinner"></div>
      <span class="btn-text">Create Account →</span>
    </button>
  </form>

  <div class="divider">or</div>

  <div class="footer-link">
    Already have an account? <a href="login.html">Sign in</a>
  </div>
</div>

<script>
// Redirect if already logged in
(function() {
  const token = localStorage.getItem('ragToken');
  if (token) { try { const p = JSON.parse(atob(token.split('.')[1])); if (p.exp > Date.now()/1000) window.location.href = 'index.html'; } catch{} }
})();

function togglePwd(id, btn) {
  const inp = document.getElementById(id);
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}

function checkStrength(val) {
  const wrap = document.getElementById('strength-wrap');
  const label = document.getElementById('s-label');
  wrap.style.display = val ? 'block' : 'none';
  if (!val) return;
  let score = 0;
  if (val.length >= 6) score++;
  if (val.length >= 10) score++;
  if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
  if (/[0-9!@#$%^&*]/.test(val)) score++;
  const colors = ['#f87171','#fb923c','#fbbf24','#34d399'];
  const labels = ['Weak','Fair','Good','Strong'];
  const labColors = ['#f87171','#fb923c','#fbbf24','#34d399'];
  for (let i=1;i<=4;i++) {
    document.getElementById('s'+i).style.background = i <= score ? colors[score-1] : 'rgba(99,120,180,.15)';
  }
  label.textContent = labels[score-1] || '';
  label.style.color = labColors[score-1] || 'transparent';
}

function checkMatch() {
  const p = document.getElementById('password').value;
  const c = document.getElementById('confirm').value;
  const hint = document.getElementById('match-hint');
  if (!c) { hint.textContent=''; return; }
  if (p === c) { hint.textContent = '✓ Passwords match'; hint.style.color = '#34d399'; }
  else { hint.textContent = '✗ Passwords do not match'; hint.style.color = '#f87171'; }
}

function showMsg(text, type) {
  const box = document.getElementById('msg-box');
  box.className = 'msg-box ' + type;
  box.innerHTML = (type==='error'?'⚠ ':'✅ ') + text;
  box.style.display = 'flex';
}

async function handleRegister(e) {
  e.preventDefault();
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  const terms = document.getElementById('terms').checked;
  const btn = document.getElementById('submit-btn');

  if (!name) { showMsg('Please enter your full name.', 'error'); return; }
  if (!email) { showMsg('Please enter your email address.', 'error'); return; }
  if (password.length < 6) { showMsg('Password must be at least 6 characters.', 'error'); return; }
  if (password !== confirm) { showMsg('Passwords do not match.', 'error'); return; }
  if (!terms) { showMsg('Please agree to the Terms of Service.', 'error'); return; }

  btn.classList.add('loading'); btn.disabled = true;
  document.getElementById('msg-box').style.display = 'none';

  try {
    const res = await fetch('/api/auth?action=register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    });
    const data = await res.json();
    if (!res.ok) { showMsg(data.error || 'Registration failed.', 'error'); return; }

    localStorage.setItem('ragToken', data.token);
    localStorage.setItem('ragUser', JSON.stringify(data.user));
    showMsg('Account created! Redirecting…', 'success');
    setTimeout(() => window.location.href = 'index.html', 900);
  } catch (err) {
    showMsg('Network error. Please try again.', 'error');
  } finally {
    btn.classList.remove('loading'); btn.disabled = false;
  }
}
</script>
</body>
</html>
